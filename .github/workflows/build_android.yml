name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip wget curl \
          build-essential autoconf automake libtool \
          libltdl-dev pkg-config cmake \
          libffi-dev libssl-dev zlib1g-dev \
          libsqlite3-dev libbz2-dev \
          openjdk-17-jdk \
          lld clang

    - name: Install buildozer
      run: |
        pip install --upgrade pip wheel
        pip install \
          "buildozer==1.5.0" \
          "cython==0.29.37" \
          "python-for-android==2024.1.21"

    - name: Cache buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v2
        restore-keys: |
          buildozer-

    # Pre-write the SDK license files directly — no sdkmanager needed,
    # no hanging prompts. These are the standard SHA hashes Android accepts.
    - name: Pre-accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        printf "84831b9409646a918e30573bab4c9c91346d8abd" \
          > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build debug APK
      run: buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: "0"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendsCursedRealm-debug-apk
        path: bin/*.apk
        retention-days: 30
