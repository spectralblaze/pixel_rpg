name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    # Opt into Node.js 24 now to silence the Node 20 deprecation warnings.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip wget curl \
          build-essential autoconf automake libtool \
          libltdl-dev pkg-config cmake \
          libffi-dev libssl-dev zlib1g-dev \
          libsqlite3-dev libbz2-dev \
          openjdk-17-jdk lld clang
        sudo update-java-alternatives --set java-1.17.0-openjdk-amd64 2>/dev/null || true

    - name: Install buildozer
      run: |
        pip install --upgrade pip wheel
        pip install \
          "buildozer==1.5.0" \
          "cython==0.29.37" \
          "python-for-android==2024.1.21"

    # GitHub Actions runners already have the Android SDK installed.
    # Point buildozer at it so it doesn't download a second copy.
    # buildozer 1.5.0 expects sdkmanager at the OLD path (tools/bin/);
    # modern SDKs put it under cmdline-tools/latest/bin/ — create a symlink.
    - name: Set up Android SDK
      run: |
        echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        # Android Gradle plugin requires Java 17; the runner default is Java 11.
        # JAVA_HOME_17_X64 is pre-set by the GitHub Actions runner image.
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

        # Accept all licenses non-interactively
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

        # Symlink sdkmanager to the old path buildozer 1.5.0 expects
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
               $ANDROID_SDK_ROOT/tools/bin/sdkmanager

        # Install the platform + build-tools buildozer will ask for
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools" 2>/dev/null || true

    - name: Cache buildozer NDK and compiled recipes
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v6
        restore-keys: |
          buildozer-

    - name: Build debug APK
      run: buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: "0"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendsCursedRealm-debug-apk
        path: bin/*.apk
        retention-days: 30
