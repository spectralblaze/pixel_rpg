name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip wget curl \
          build-essential autoconf automake libtool \
          libltdl-dev pkg-config cmake \
          libffi-dev libssl-dev zlib1g-dev \
          libsqlite3-dev libbz2-dev \
          openjdk-17-jdk lld clang
        sudo update-java-alternatives --set java-1.17.0-openjdk-amd64 2>/dev/null || true

    - name: Install buildozer
      run: |
        pip install --upgrade pip wheel
        pip install \
          "buildozer==1.5.0" \
          "cython==0.29.37" \
          "python-for-android==2024.1.21"

    # GitHub Actions runners already have the Android SDK installed.
    # Point buildozer at it so it doesn't download a second copy.
    # buildozer 1.5.0 expects sdkmanager at the OLD path (tools/bin/);
    # modern SDKs put it under cmdline-tools/latest/bin/ — create a symlink.
    - name: Set up Android SDK
      run: |
        echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        # Android Gradle plugin requires Java 17; the runner default is Java 11.
        # JAVA_HOME_17_X64 is pre-set by the GitHub Actions runner image.
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

        # Accept all licenses non-interactively
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

        # Symlink sdkmanager to the old path buildozer 1.5.0 expects
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
               $ANDROID_SDK_ROOT/tools/bin/sdkmanager

        # Install the platform + build-tools buildozer will ask for
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools" 2>/dev/null || true

    # Override the p4a pygame recipe to use pygame 2.6.1 instead of 2.1.3.
    # pygame 2.1.3 includes longintrepr.h (removed from Android cross-compile
    # headers) in its _sdl2 C extension; 2.6.1 does not.
    # We query the PyPI JSON API for the sha256 — no SDL2 or build tools needed.
    # Both 'pygame' and 'pygame2' recipe dirs are written so whichever name
    # p4a resolves the requirement to, our override wins.
    - name: Create local pygame recipe (2.6.1 – fixes longintrepr.h)
      run: |
        mkdir -p p4a_recipes/pygame
        python3 - <<'PYEOF'
        import urllib.request, json, os, sys

        # --- get sha256 from PyPI JSON API (no build, no SDL2 needed) ---
        api = "https://pypi.org/pypi/pygame/2.6.1/json"
        with urllib.request.urlopen(api) as resp:
            data = json.loads(resp.read())

        sdist = next(
            (f for f in data["urls"] if f["packagetype"] == "sdist"),
            None,
        )
        if sdist is None:
            sys.exit("ERROR: no sdist found for pygame 2.6.1 on PyPI")

        sha256  = sdist["digests"]["sha256"]
        dl_url  = sdist["url"]
        # Turn the exact CDN URL into a {version} template
        tpl_url = dl_url.replace("2.6.1", "{version}")

        print(f"pygame 2.6.1 sha256 = {sha256}")
        print(f"url template        = {tpl_url}")

        # --- write recipe for both 'pygame' and 'pygame2' names ---
        # Inheriting from Pygame2Recipe keeps all Android build flags/patches
        # from the built-in recipe; we only swap version / url / sha256.
        # patches=[] ensures 2.1.3-era patch files are not applied to 2.6.1.
        # At p4a v2024.01.21 the recipe module is 'pygame' (not 'pygame2').
        # We cannot do a normal import because p4a registers OUR local recipe
        # as sys.modules['pythonforandroid.recipes.pygame'] before running our
        # code, which would cause a circular import.  Instead we load the
        # built-in recipe file by path under a private module name so we can
        # safely subclass it.
        content = (
            "import importlib.util as _ilu, os as _os, sys as _sys\n"
            "\n"
            "import pythonforandroid as _p4a\n"
            "_builtin_path = _os.path.join(\n"
            "    _os.path.dirname(_p4a.__file__), 'recipes', 'pygame', '__init__.py'\n"
            ")\n"
            "_spec = _ilu.spec_from_file_location('_pygame_builtin_recipe', _builtin_path)\n"
            "_mod  = _ilu.module_from_spec(_spec)\n"
            "_sys.modules['_pygame_builtin_recipe'] = _mod\n"
            "_spec.loader.exec_module(_mod)\n"
            "_Base = _mod.recipe.__class__\n"
            "\n"
            "\n"
            "class PygameRecipe(_Base):\n"
            "    name    = 'pygame'\n"
            "    version = '2.6.1'\n"
            "    url     = '" + tpl_url + "'\n"
            "    sha256  = '" + sha256 + "'\n"
            "    patches = []  # 2.1.3-era patches do not apply to 2.6.1\n"
            "\n"
            "\n"
            "recipe = PygameRecipe()\n"
        )
        os.makedirs("p4a_recipes/pygame", exist_ok=True)
        with open("p4a_recipes/pygame/__init__.py", "w") as fh:
            fh.write(content)
        print("Written: p4a_recipes/pygame/__init__.py")
        PYEOF
        echo "--- pygame recipe ---"
        cat p4a_recipes/pygame/__init__.py

    - name: Cache buildozer NDK and compiled recipes
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v5
        restore-keys: |
          buildozer-

    - name: Build debug APK
      run: buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: "0"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendsCursedRealm-debug-apk
        path: bin/*.apk
        retention-days: 30
