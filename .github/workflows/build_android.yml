name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip wget curl \
          build-essential autoconf automake libtool \
          libltdl-dev pkg-config cmake \
          libffi-dev libssl-dev zlib1g-dev \
          libsqlite3-dev libbz2-dev \
          openjdk-17-jdk lld clang
        sudo update-java-alternatives --set java-1.17.0-openjdk-amd64 2>/dev/null || true

    - name: Install buildozer
      run: |
        pip install --upgrade pip wheel
        pip install \
          "buildozer==1.5.0" \
          "cython==0.29.37" \
          "python-for-android==2024.1.21"

    # GitHub Actions runners already have the Android SDK installed.
    # Point buildozer at it so it doesn't download a second copy.
    # buildozer 1.5.0 expects sdkmanager at the OLD path (tools/bin/);
    # modern SDKs put it under cmdline-tools/latest/bin/ — create a symlink.
    - name: Set up Android SDK
      run: |
        echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

        # Accept all licenses non-interactively
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

        # Symlink sdkmanager to the old path buildozer 1.5.0 expects
        mkdir -p $ANDROID_SDK_ROOT/tools/bin
        ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
               $ANDROID_SDK_ROOT/tools/bin/sdkmanager

        # Install the platform + build-tools buildozer will ask for
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" \
          "build-tools;33.0.2" \
          "platform-tools" 2>/dev/null || true

    # Override the p4a pygame recipe to use pygame 2.6.1 instead of 2.1.3.
    # pygame 2.1.3 includes longintrepr.h (removed in Python 3.12+) in its
    # _sdl2 C extension; 2.6.1 does not.  We download the sdist to compute
    # the sha256 at build time so the recipe stays correct if PyPI ever
    # re-releases the tarball.
    - name: Create local pygame recipe (2.6.1 – fixes longintrepr.h)
      run: |
        mkdir -p p4a_recipes/pygame
        pip download pygame==2.6.1 --no-deps --no-binary :all: -d /tmp/pg_dl
        python3 - <<'PYEOF'
        import hashlib, glob, sys, os

        files = glob.glob('/tmp/pg_dl/pygame-*.tar.gz')
        if not files:
            sys.exit("ERROR: pygame 2.6.1 source tarball not found in /tmp/pg_dl")

        sha256 = hashlib.sha256(open(files[0], 'rb').read()).hexdigest()
        print(f"pygame 2.6.1 sha256 = {sha256}")

        lines = [
            "from pythonforandroid.recipes.pygame2 import Pygame2Recipe as _Base\n",
            "\n",
            "\n",
            "class PygameRecipe(_Base):\n",
            "    name = 'pygame'\n",
            "    version = '2.6.1'\n",
            "    url = (\n",
            "        'https://files.pythonhosted.org/packages/source/p/pygame/'\n",
            "        'pygame-{version}.tar.gz'\n",
            "    )\n",
            f"    sha256 = '{sha256}'\n",
            "    patches = []  # no 2.1.3 patches needed for 2.6.1\n",
            "\n",
            "\n",
            "recipe = PygameRecipe()\n",
        ]

        out = 'p4a_recipes/pygame/__init__.py'
        with open(out, 'w') as fh:
            fh.writelines(lines)
        print(f"Recipe written to {out}")
        PYEOF
        echo "--- generated recipe ---"
        cat p4a_recipes/pygame/__init__.py

    - name: Cache buildozer NDK and compiled recipes
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v5
        restore-keys: |
          buildozer-

    - name: Build debug APK
      run: buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: "0"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: LegendsCursedRealm-debug-apk
        path: bin/*.apk
        retention-days: 30
